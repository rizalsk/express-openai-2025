<!-- Overlay -->
<div
  id="overlay"
  onclick="toggleSidebar()"
  class="fixed inset-0 bg-black/50 z-30 hidden lg:hidden"
></div>
<aside
  id="sidebar"
  class="
    fixed inset-y-0 left-0 z-40
    w-64 bg-gray-800 text-white
    p-5
    transform -translate-x-full
    transition-transform duration-300
    overflow-y-auto h-screen
    lg:static lg:translate-x-0 lg:h-auto
  "
>
  <div class="flex items-center space-x-2 mb-10">

      </svg>

  <ul class="space-y-2">
    <!-- Dashboard -->
    <li>
      <a href="/dashboard" class="flex items-center space-x-2 hover:bg-gray-700 p-2 rounded">
        <span>Dashboard</span>

    </li>
    
    <li>
      <a href="/dashboard/chatbot" class="flex items-center space-x-2 hover:bg-gray-700 p-2 rounded">

    <li>

      </a>
    </li>

    <li>
      <a href="/dashboard/chat" class="flex items-center space-x-2 hover:bg-gray-700 p-2 rounded">

    </li>

    <li>
      <a href="#" class="flex items-center space-x-2 hover:bg-gray-700 p-2 rounded">
        <span>Coming soon..</span>

        <span>Users</span>

          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M19 9l-7 7-7-7" />
        </svg>
      </button>

      <ul id="usersDropdown" class="hidden mt-1 space-y-1 pl-4">
        <li>
          <a href="/dashboard/users" class="block p-2 text-gray-300 hover:bg-gray-700 rounded">All Users</a>

        <li>

        </li>
        <li>
          <a href="#" class="block p-2 text-gray-300 hover:bg-gray-700 rounded">Roles</a>

    <li>
      <a href="/dashboard/setting" class="flex items-center space-x-2 hover:bg-gray-700 p-2 rounded">
