<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard</title>
  <link rel="shortcut icon" id="favicon" href="/images/favicon.svg">

  <!-- TailAdmin / Tailwind CSS -->
  <link href="/css/main.css" rel="stylesheet">
</head>
<body class="bg-gray-100">

  <div class="flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <div id="sidebar">
      <!-- SIDEBAR -->
    </div>

    <!-- Main Content -->
    <div class="relative flex flex-1 flex-col overflow-y-auto overflow-x-hidden">

      <!-- Header -->
      <div id="header">
        <!-- HEADER -->
      </div>

      <!-- Page Content -->
      <!-- Main Content -->
        <main class="flex-1 p-6">
            <%- include(content) %>
            <!-- This placeholder will be replaced with the dynamic content (like the login page) -->
        </main>

      <!-- Footer -->
      <div id="footer">
        <!-- FOOTER -->
      </div>

    </div>
  </div>

  <!-- JS -->
  <script src="/js/app.js"></script>
</body>
</html>
