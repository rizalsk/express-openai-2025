<div class="h-[91vh] flex bg-gray-100">

  <!-- Sidebar (opsional) -->
  <aside class="w-64 bg-white border-r border-gray-200 flex flex-col hidden lg:flex">
    <div class="p-4 border-b border-gray-200">
      <h1 class="text-xl font-semibold">History</h1>
    </div>
    <ul class="flex-1 overflow-y-auto p-2 space-y-2">
      <li class="p-3 hover:bg-gray-100 cursor-pointer rounded">Sunset over mountains</li>
      <li class="p-3 hover:bg-gray-100 cursor-pointer rounded">Robot in cityscape</li>
      <li class="p-3 hover:bg-gray-100 cursor-pointer rounded">Cute kitten cartoon</li>
    </ul>
  </aside>

  <!-- Chat Area -->
  <div class="flex-1 flex flex-col">
    <!-- Chat header -->
    <div class="p-4 border-b border-gray-200 flex justify-between items-center bg-white">
      <h1 class="text-xl font-semibold">Image Generator Chatbot</h1>
      <button class="text-gray-500 hover:text-gray-700">Options</button>
    </div>

    <!-- Chat messages -->
    <div class="flex-1 p-4 overflow-y-auto space-y-4 bg-gray-50" id="chatArea">

      <!-- Example: user request -->
      <div class="flex justify-end">
        <div class="bg-blue-500 text-white p-3 rounded-lg shadow-sm max-w-xs break-words">
          Generate an image of a futuristic city at night
          <span class="text-xs text-gray-200 block text-right mt-1">10:00 AM</span>
        </div>
      </div>

      <!-- Example: generated image -->
      <div class="flex items-start gap-3">
        <img src="https://images.unsplash.com/photo-1580895456895-cfdf02e4c23f?q=80&w=774&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" class="w-32 h-32 rounded-lg shadow-md" alt="Generated">
        <div class="flex flex-col">
          <div class="bg-white p-3 rounded-lg shadow-sm max-w-xs">
            <p>Here’s your generated image!</p>
          </div>
          <span class="text-xs text-gray-400 mt-1">10:01 AM</span>
        </div>
      </div>

    </div>

    <!-- Chat input -->
    <div class="p-4 border-t border-gray-200 bg-white flex items-center gap-3">
      <input type="text" id="promptInput" placeholder="Type your image description..."
        class="flex-1 px-4 py-2 border rounded-full focus:outline-none focus:ring focus:border-blue-300" />
      <button id="sendBtn" class="bg-blue-500 text-white px-4 py-2 rounded-full hover:bg-blue-600">Generate</button>
    </div>
  </div>

  <script>
    // Contoh menambahkan chat / image secara dinamis
    const chatArea = document.getElementById('chatArea');
    const sendBtn = document.getElementById('sendBtn');
    const promptInput = document.getElementById('promptInput');

    sendBtn.addEventListener('click', () => {
      const prompt = promptInput.value.trim();
      if (!prompt) return;

      // Tambahkan pesan user
      const userMsg = document.createElement('div');
      userMsg.className = 'flex justify-end';
      userMsg.innerHTML = `
        <div class="bg-blue-500 text-white p-3 rounded-lg shadow-sm max-w-xs break-words">
          ${prompt}
          <span class="text-xs text-gray-200 block text-right mt-1">Now</span>
        </div>
      `;
      chatArea.appendChild(userMsg);

      // Tambahkan "generated image" placeholder
      const imgContainer = document.createElement('div');
      imgContainer.className = 'flex items-start gap-3';
      imgContainer.innerHTML = `
        <img src="https://plus.unsplash.com/premium_photo-1666700698946-fbf7baa0134a?q=80&w=872&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" class="w-32 h-32 rounded-lg shadow-md" alt="Generated">
        <div class="flex flex-col">
          <div class="bg-white p-3 rounded-lg shadow-sm max-w-xs">
            <p>Here’s your generated image!</p>
          </div>
          <span class="text-xs text-gray-400 mt-1">Now</span>
        </div>
      `;
      chatArea.appendChild(imgContainer);

      chatArea.scrollTop = chatArea.scrollHeight;
      promptInput.value = '';
    });
  </script>

</div>
