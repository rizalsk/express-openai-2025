<div class="h-[90vh] flex bg-gray-100">

  <!-- Sidebar (opsional) -->
  <aside class="w-64 bg-white border-r border-gray-200 flex flex-col hidden lg:flex">
    <div class="p-4 border-b border-gray-200">
      <h1 class="text-xl font-semibold">Chat History</h1>
    </div>
    <ul class="flex-1 overflow-y-auto p-2 space-y-2">
      <li class="p-3 hover:bg-gray-100 cursor-pointer rounded">Hello chatbot</li>
      <li class="p-3 hover:bg-gray-100 cursor-pointer rounded">Generate image of a cat</li>
      <li class="p-3 hover:bg-gray-100 cursor-pointer rounded">Ask about weather</li>
    </ul>
  </aside>

  <!-- Chat Area -->
  <div class="flex-1 flex flex-col">
    <!-- Chat Header -->
    <div class="p-4 border-b border-gray-200 flex justify-between items-center bg-white">
      <h1 class="text-xl font-semibold">Chatbot</h1>
      <button class="text-gray-500 hover:text-gray-700">Options</button>
    </div>

    <!-- Chat Messages -->
    <div class="flex-1 p-4 overflow-y-auto space-y-4 bg-gray-50" id="chatArea">
      <!-- Incoming message -->
      <div class="flex items-start gap-3">
        <div class="bg-white p-3 rounded-lg shadow-sm max-w-xs break-words">
          Hello! How can I assist you today?
          <span class="text-xs text-gray-400 block mt-1">10:00 AM</span>
        </div>
      </div>

      <!-- Outgoing message -->
      <div class="flex justify-end">
        <div class="bg-blue-500 text-white p-3 rounded-lg shadow-sm max-w-xs break-words">
          Can you generate an image of a futuristic city?
          <span class="text-xs text-gray-200 block text-right mt-1">10:01 AM</span>
        </div>
      </div>
    </div>

    <!-- Chat Input -->
    <div class="p-4 border-t border-gray-200 bg-white flex items-center gap-3">
      <input type="text" id="userInput" placeholder="Type a message..."
        class="flex-1 px-4 py-2 border rounded-full focus:outline-none focus:ring focus:border-blue-300" />
      <button id="sendBtn" class="bg-blue-500 text-white px-4 py-2 rounded-full hover:bg-blue-600">Send</button>
    </div>
  </div>

  <script>
    const chatArea = document.getElementById('chatArea');
    const sendBtn = document.getElementById('sendBtn');
    const userInput = document.getElementById('userInput');

    sendBtn.addEventListener('click', () => {
      const message = userInput.value.trim();
      if (!message) return;

      // Tambahkan pesan user
      const userMsg = document.createElement('div');
      userMsg.className = 'flex justify-end';
      userMsg.innerHTML = `
        <div class="bg-blue-500 text-white p-3 rounded-lg shadow-sm max-w-xs break-words">
          ${message}
          <span class="text-xs text-gray-200 block text-right mt-1">Now</span>
        </div>
      `;
      chatArea.appendChild(userMsg);

      // Tambahkan "chatbot reply" placeholder
      const botMsg = document.createElement('div');
      botMsg.className = 'flex items-start gap-3';
      botMsg.innerHTML = `
        <div class="bg-white p-3 rounded-lg shadow-sm max-w-xs break-words">
          This is a response from the chatbot.
          <span class="text-xs text-gray-400 block mt-1">Now</span>
        </div>
      `;
      chatArea.appendChild(botMsg);

      chatArea.scrollTop = chatArea.scrollHeight;
      userInput.value = '';
    });
  </script>

</div>
