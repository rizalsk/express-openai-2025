<div class="h-[93vh] flex bg-gray-100">

  <!-- Sidebar: Contacts / Rooms -->
  <aside class="w-64 bg-white border-r border-gray-200 flex flex-col">
    <div class="p-4 border-b border-gray-200">
      <h1 class="text-xl font-semibold">Chats</h1>
    </div>

    <!-- Search -->
    <div class="p-2">
      <input type="text" placeholder="Search..."
        class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring focus:border-blue-300" />
    </div>

    <!-- Contact list -->
    <ul class="flex-1 overflow-y-auto">
      <li class="p-3 hover:bg-gray-100 cursor-pointer flex items-center gap-3">
        <img src="https://plus.unsplash.com/premium_photo-1732757787588-29df717691f4?q=80&w=1508&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" class="w-10 h-10 rounded-full" alt="User">
        <div class="flex-1">
          <div class="flex justify-between">
            <span class="font-medium">John Doe</span>
            <span class="text-xs text-gray-400">10:30 AM</span>
          </div>
          <p class="text-sm text-gray-500 truncate">Hey! Are you available?</p>
        </div>
      </li>
      <li class="p-3 hover:bg-gray-100 cursor-pointer flex items-center gap-3">
        <img src="https://images.unsplash.com/photo-1740252117027-4275d3f84385?q=80&w=1160&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" class="w-10 h-10 rounded-full" alt="User">
        <div class="flex-1">
          <div class="flex justify-between">
            <span class="font-medium">Jane Smith</span>
            <span class="text-xs text-gray-400">09:15 AM</span>
          </div>
          <p class="text-sm text-gray-500 truncate">Let's meet tomorrow</p>
        </div>
      </li>
      <!-- Tambahkan lebih banyak kontak -->
    </ul>
  </aside>

  <!-- Chat Area -->
  <div class="flex-1 flex flex-col">
    <!-- Chat header -->
    <div class="p-4 border-b border-gray-200 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <img src="https://images.unsplash.com/photo-1740252117012-bb53ad05e370?q=80&w=1160&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" class="w-10 h-10 rounded-full" alt="Chat User">
        <span class="font-semibold">John Doe</span>
      </div>
      <button class="text-gray-500 hover:text-gray-700">Options</button>
    </div>

    <!-- Chat messages -->
    <div class="flex-1 p-4 overflow-y-auto space-y-4 bg-gray-50">
      <!-- Incoming message -->
      <div class="flex items-start gap-3">
        <img src="https://images.unsplash.com/photo-1740252117027-4275d3f84385?q=80&w=1160&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" class="w-8 h-8 rounded-full" alt="User">
        <div class="bg-white p-3 rounded-lg shadow-sm max-w-xs">
          <p>Hello! How are you?</p>
          <span class="text-xs text-gray-400">10:30 AM</span>
        </div>
      </div>

      <!-- Outgoing message -->
      <div class="flex justify-end">
        <div class="bg-blue-500 text-white p-3 rounded-lg shadow-sm max-w-xs">
          <p>I'm good, thanks! You?</p>
          <span class="text-xs text-gray-200 block text-right">10:32 AM</span>
        </div>
      </div>

      <!-- Incoming message -->
      <div class="flex items-start gap-3">
        <img src="https://images.unsplash.com/photo-1740252117027-4275d3f84385?q=80&w=1160&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" class="w-8 h-8 rounded-full" alt="User">
        <div class="bg-white p-3 rounded-lg shadow-sm max-w-xs">
          <p>Doing well. Did you check the report?</p>
          <span class="text-xs text-gray-400">10:35 AM</span>
        </div>
      </div>
    </div>

    <!-- Chat input -->
    <div class="p-4 border-t border-gray-200 bg-white flex items-center gap-3">
      <input type="text" placeholder="Type a message..."
        class="flex-1 px-4 py-2 border rounded-full focus:outline-none focus:ring focus:border-blue-300" />
      <button class="bg-blue-500 text-white px-4 py-2 rounded-full hover:bg-blue-600">Send</button>
    </div>
  </div>

</div>
