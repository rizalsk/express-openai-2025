<div class="flex items-center justify-center min-h-screen">

    <div class="w-full max-w-md bg-white p-8 rounded-lg shadow-lg">

      <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">Login</h2>

      <form action="/auth/login" method="POST">
        <div class="mb-4">
          <label for="email" class="block text-gray-700">Username</label>
          <input type="text" id="text" name="username" required class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div class="mb-6">
          <label for="password" class="block text-gray-700">Password</label>
          <input type="password" id="password" name="password" required class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <p class="text-red-500 text-center">
            <%- error_message %>
        </p>

        <div class="mb-6 flex items-center justify-between">
          <div class="flex items-center">
            <input type="checkbox" id="remember" name="remember" class="mr-2">
            <label for="remember" class="text-gray-700">Remember Me</label>
          </div>
          <a href="#" class="text-blue-500 hover:underline">Forgot Password?</a>
        </div>

        <button type="submit" class="w-full bg-blue-500 text-white py-2 rounded-md hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-500">Login</button>
      </form>

      <div class="mt-6 text-center">
        <p class="text-gray-600">Don't have an account? <a href="/auth/register" class="text-blue-500 hover:underline">Sign Up</a></p>
      </div>

    </div>

  </div>
